# Ir al repositorio de código
Set-Location C:\Users\xenca\Documents\argo\ecommerce-app\ecommerce-app

# Reemplazar el archivo nginx.conf
@"
server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # Configuración para SPA (Single Page Application)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy inverso para las llamadas a la API
    location /api/ {
        set $backend "api-gateway:8080";
        proxy_pass http://$backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
"@ | Out-File -FilePath .\frontend-react\nginx.conf -Encoding utf8