# Ir al repositorio de código
Set-Location C:\Users\xenca\Documents\argo\ecommerce-app\ecommerce-app

# Reemplazar nginx.conf con la configuración corregida
@"
server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api-gateway:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuración para manejar correctamente el body
        proxy_set_header Content-Type $content_type;
        proxy_set_header Content-Length $content_length;

        # Asegurar que el body se reenvía correctamente
        proxy_pass_request_body on;
        proxy_set_header Connection "";
    }
}
"@ | Out-File -FilePath .\frontend-react\nginx.conf -Encoding utf8