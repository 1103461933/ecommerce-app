name: Build and Push E-commerce Images

on:
  push:
    branches: [ main ]

env:
  DOCKERHUB_USERNAME: xlen911

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: dev   # ✅ Usa los secretos del ambiente dev
    strategy:
      matrix:
        service: [frontend-react, backend-api-gateway, backend-user-service, backend-product-service]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max